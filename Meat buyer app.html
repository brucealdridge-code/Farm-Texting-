<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livestock Pro Directory & Mass Messaging System</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 520px;
            box-sizing: border-box;
        }
        h2, h3 { margin-top: 0; color: #222; text-align: center; }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 8px; text-align: left; margin-top: 30px;}
        label { font-weight: bold; display: block; margin: 15px 0 5px; color: #444; }
        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        .radio-option {
            flex: 1;
            text-align: center;
            background: #f0f2f5;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            font-weight: bold;
        }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .radio-option {
            background: #e8f0fe;
            border-color: #1a73e8;
            color: #1a73e8;
        }
        .btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn:hover { background-color: #1557b0; }
        .btn-secondary { background-color: #5f6368; padding: 10px; font-size: 14px; }
        .btn-secondary:hover { background-color: #45474a; }
        .btn-mass { background-color: #dc3545; }
        .btn-mass:hover { background-color: #bd2130; }
        .preview-box {
            background: #f8f9fa;
            border-left: 4px solid #1a73e8;
            padding: 12px;
            margin-top: 15px;
            font-style: italic;
            font-size: 14px;
            color: #555;
            white-space: pre-wrap;
        }
        .buyer-checkbox-list {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 6px;
            max-height: 180px;
            overflow-y: auto;
            padding: 10px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .checkbox-item input { width: auto; cursor: pointer; }
        .buyer-meta {
            font-size: 0.85em;
            color: #666;
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Livestock Order Pro</h2>

    <label>Messaging Mode</label>
    <div class="radio-group">
        <label>
            <input type="radio" name="msgMode" value="single" checked onclick="toggleMessagingMode()">
            <div class="radio-option">👤 Single Buyer</div>
        </label>
        <label>
            <input type="radio" name="msgMode" value="mass" onclick="toggleMessagingMode()">
            <div class="radio-option">📢 Mass Broadcast</div>
        </label>
    </div>

    <label>Livestock Type</label>
    <div class="radio-group">
        <label>
            <input type="radio" name="animalType" value="Chickens" checked onclick="refreshUI()">
            <div class="radio-option">🐔 Chickens</div>
        </label>
        <label>
            <input type="radio" name="animalType" value="Pigs" onclick="refreshUI()">
            <div class="radio-option">🐷 Pigs</div>
        </label>
    </div>

    <div id="singleBuyerSection">
        <label for="buyerSelect">Select Buyer</label>
        <select id="buyerSelect" onchange="syncSelectedPhone()"></select>
        
        <label for="buyerPhone">Phone Number</label>
        <input type="tel" id="buyerPhone" placeholder="Buyer's mobile link" oninput="updatePreview()">
        
        <div id="buyerMetaDisplay" class="buyer-meta" style="margin-top: 8px; font-style: italic;"></div>
    </div>

    <div id="massBuyerSection" class="hidden" style="display:none;">
        <label>Select Recipients (<span id="massCount">0</span> selected)</label>
        <div id="massCheckboxList" class="buyer-checkbox-list"></div>
    </div>

    <label for="quantity" id="qtyLabel">Amount Available</label>
    <input type="number" id="quantity" value="10" min="1" oninput="updatePreview()">

    <label for="price">Price ($ per head / total alternative)</label>
    <input type="text" id="price" value="15.00 each" placeholder="e.g. 15.00 each or 200 flat" oninput="updatePreview()">

    <label for="notes">Logistics & Additional Details</label>
    <textarea id="notes" rows="3" placeholder="e.g., On-farm pickup available. Please bring your own transport crates." oninput="updatePreview()"></textarea>

    <label>Text Message Preview:</label>
    <div id="messagePreview" class="preview-box"></div>

    <button id="sendSingleBtn" class="btn" onclick="sendSingleText()">Send Text to Selected Buyer</button>
    <button id="sendMassBtn" class="btn btn-mass" style="display:none;" onclick="sendMassBroadcast()">Launch Mass Text Queue</button>

    <h3>Create Directory Profile</h3>
    
    <label for="newBuyerName">Buyer Full Name</label>
    <input type="text" id="newBuyerName" placeholder="e.g., Jace Vance">

    <label for="newBuyerCompany">Company / Farm Name (Optional)</label>
    <input type="text" id="newBuyerCompany" placeholder="e.g., Vance Processing Supply">

    <label for="newBuyerPhone">Mobile Phone</label>
    <input type="tel" id="newBuyerPhone" placeholder="e.g., 5123776075">

    <label for="newBuyerNotes">Internal Profile Notes (Preferences, sizing, limits)</label>
    <input type="text" id="newBuyerNotes" placeholder="e.g., Prefers heavy roosters / prefers feeder pigs">

    <label>Primary Livestock Profile</label>
    <div class="radio-group">
        <label>
            <input type="radio" name="newBuyerType" value="Chickens" checked>
            <div class="radio-option">🐔 Chickens</div>
        </label>
        <label>
            <input type="radio" name="newBuyerType" value="Pigs">
            <div class="radio-option">🐷 Pigs</div>
        </label>
    </div>

    <button class="btn btn-secondary" onclick="addNewBuyerProfile()">Save to System Database</button>
</div>

<script>
    // Local database parsing with hardcoded system engineering fallback templates [cite: 1, 4]
    let database = JSON.parse(localStorage.getItem('livestockProDB')) || {
        Chickens: [{ name: "Sisu Industrial Poultry", company: "Main Plant", phone: "512-377-6075", notes: "Accepts high quantities" }],
        Pigs: [{ name: "Sisu Devices Swine Depot", company: "HQ Farm", phone: "512-377-6075", notes: "Prefers butcher weights" }]
    };

    // Run initial UI generation on file boot
    refreshUI();

    function addNewBuyerProfile() {
        const name = document.getElementById('newBuyerName').value.trim();
        const company = document.getElementById('newBuyerCompany').value.trim();
        const phone = document.getElementById('newBuyerPhone').value.trim();
        const notes = document.getElementById('newBuyerNotes').value.trim();
        const type = document.querySelector('input[name="newBuyerType"]:checked').value;

        if (!name || !phone) {
            alert("Name and Mobile Phone are required to generate an internal system profile.");
            return;
        }

        database[type].push({ name: name, company: company, phone: phone, notes: notes });
        localStorage.setItem('livestockProDB', JSON.stringify(database));

        // Clean up input fields
        document.getElementById('newBuyerName').value = '';
        document.getElementById('newBuyerCompany').value = '';
        document.getElementById('newBuyerPhone').value = '';
        document.getElementById('newBuyerNotes').value = '';

        document.querySelector(`input[name="animalType"][value="${type}"]`).checked = true;
        refreshUI();
        alert(`Profile for ${name} successfully written into local memory storage layers.`);
    }

    function toggleMessagingMode() {
        const mode = document.querySelector('input[name="msgMode"]:checked').value;
        const singleSection = document.getElementById('singleBuyerSection');
        const massSection = document.getElementById('massBuyerSection');
        const singleBtn = document.getElementById('sendSingleBtn');
        const massBtn = document.getElementById('sendMassBtn');

        if (mode === 'single') {
            singleSection.style.display = 'block';
            massSection.style.display = 'none';
            singleBtn.style.display = 'block';
            massBtn.style.display = 'none';
        } else {
            singleSection.style.display = 'none';
            massSection.style.display = 'block';
            singleBtn.style.display = 'none';
            massBtn.style.display = 'block';
            generateMassCheckboxList();
        }
        updatePreview();
    }

    function refreshUI() {
        const activeType = document.querySelector('input[name="animalType"]:checked').value;
        document.getElementById('qtyLabel').innerText = `Amount of ${activeType} Available`;
        
        // Repopulate single dropdown selection box
        const selectBox = document.getElementById('buyerSelect');
        selectBox.innerHTML = '';

        database[activeType].forEach((buyer) => {
            let opt = document.createElement('option');
            opt.value = buyer.phone;
            opt.innerText = buyer.company ? `${buyer.name} (${buyer.company})` : buyer.name;
            selectBox.appendChild(opt);
        });

        syncSelectedPhone();
        generateMassCheckboxList();
    }

    function syncSelectedPhone() {
        const selectBox = document.getElementById('buyerSelect');
        const activeType = document.querySelector('input[name="animalType"]:checked').value;
        
        if(selectBox.value) {
            document.getElementById('buyerPhone').value = selectBox.value;
            
            // Find active record profile metadata to display
            const match = database[activeType].find(b => b.phone === selectBox.value);
            if(match && match.notes) {
                document.getElementById('buyerMetaDisplay').innerText = `Notes: ${match.notes}`;
            } else {
                document.getElementById('buyerMetaDisplay').innerText = "";
            }
        } else {
            document.getElementById('buyerPhone').value = '';
            document.getElementById('buyerMetaDisplay').innerText = "";
        }
        updatePreview();
    }

    function generateMassCheckboxList() {
        const activeType = document.querySelector('input[name="animalType"]:checked').value;
        const listContainer = document.getElementById('massCheckboxList');
        listContainer.innerHTML = '';

        if(database[activeType].length === 0) {
            listContainer.innerHTML = "<div style='color:#999; text-align:center; padding:10px;'>No directory profiles saved under this animal type.</div>";
            return;
        }

        database[activeType].forEach((buyer, i) => {
            const label = document.createElement('label');
            label.className = 'checkbox-item';
            
            const subText = buyer.company ? ` [${buyer.company}]` : '';
            
            label.innerHTML = `
                <input type="checkbox" name="massRecipient" value="${buyer.phone}" onchange="updateMassCount()">
                <div>
                    <strong>${buyer.name}${subText}</strong>
                    <div style="font-size:12px; color:#666;">Phone: ${buyer.phone}</div>
                </div>
            `;
            listContainer.appendChild(label);
        });
        updateMassCount();
    }

    function updateMassCount() {
        const checked = document.querySelectorAll('input[name="massRecipient"]:checked').length;
        document.getElementById('massCount').innerText = checked;
    }

    function generateMessageText() {
        const type = document.querySelector('input[name="animalType"]:checked').value;
        const qty = document.getElementById('quantity').value;
        const pricing = document.getElementById('price').value;
        const notes = document.getElementById('notes').value;

        let msg = `Livestock Availability Update:\n`;
        msg += `I have ${qty} ${type.toLowerCase()} ready right now.\n`;
        msg += `Price: ${pricing}\n`;
        if (notes.trim() !== "") {
            msg += `Details: ${notes}\n`;
        }
        msg += `Please reply directly if you want to claim these. Thank you!`;
        return msg;
    }

    function updatePreview() {
        document.getElementById('messagePreview').innerText = generateMessageText();
    }

    function sendSingleText() {
        const rawPhone = document.getElementById('buyerPhone').value;
        const cleanPhone = rawPhone.replace(/\D/g, '');
        const message = generateMessageText();

        if (!cleanPhone) {
            alert("Select a valid buyer phone profile first.");
            return;
        }

        window.location.href = `sms:${cleanPhone}?&body=${encodeURIComponent(message)}`;
    }

    // --- AUTOMATED MASS TEXT LOOP PROTOCOL ---
    function sendMassBroadcast() {
        const selectedCheckboxes = document.querySelectorAll('input[name="massRecipient"]:checked');
        const message = generateMessageText();

        if(selectedCheckboxes.length === 0) {
            alert("Please select at least one customer profile checkbox from the list to initiate broadcast loops.");
            return;
        }

        if(confirm(`This will queue up messages for ${selectedCheckboxes.length} different buyers. Ready to open your messaging app for each one?`)) {
            
            // Loop through each recipient and pass off execution arrays to cellular dispatch hooks
            selectedCheckboxes.forEach((cb, index) => {
                const cleanNum = cb.value.replace(/\D/g, '');
                
                // Stagger system runtime firing windows slightly to allow hardware native rendering buffers to separate
                setTimeout(() => {
                    const smsLink = `sms:${cleanNum}?&body=${encodeURIComponent(message)}`;
                    
                    // Create standalone invisible routing window tabs to force sequential SMS application triggers
                    let secondaryFrame = window.open(smsLink, '_blank');
                    if(secondaryFrame) {
                        setTimeout(() => secondaryFrame.close(), 1000);
                    }
                }, index * 1800); // 1.8 second delay per message ensures browser window hooks won't lock up or flag as spam
            });
        }
    }
</script>

</body>
</html>
